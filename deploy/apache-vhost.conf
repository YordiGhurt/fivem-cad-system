# Apache VirtualHost Konfiguration für cad.bigone1.net
# Diese Direktiven in KeyHelp unter "Erweiterte Direktiven" eintragen
# oder in /etc/apache2/sites-available/cad.bigone1.net.conf speichern
#
# WICHTIG: SSLProxyEngine NICHT aktivieren – Docker läuft intern ohne SSL!
# Apache/KeyHelp übernimmt SSL (HTTPS), Docker läuft nur auf http://127.0.0.1:3000

<IfModule mod_proxy.c>
    # Let's Encrypt / KeyHelp ACME Challenge nicht proxyen
    ProxyPass /.well-known/acme-challenge !
</IfModule>

Alias /.well-known/acme-challenge /home/keyhelp/www/.well-known/acme-challenge

ProxyRequests Off
ProxyPreserveHost On

# Proxy zu Docker Container (HTTP intern, kein SSLProxyEngine nötig!)
ProxyPass / http://127.0.0.1:3000/
ProxyPassReverse / http://127.0.0.1:3000/

# WebSocket Support für Socket.IO (Echtzeit-Features)
# Requires: a2enmod proxy_wstunnel rewrite
RewriteEngine On
RewriteCond %{HTTP:Upgrade} websocket [NC]
RewriteCond %{HTTP:Connection} upgrade [NC]
RewriteRule ^/?(.*) "ws://127.0.0.1:3000/$1" [P,L]
