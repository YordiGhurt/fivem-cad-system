version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cad-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cad_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cad_password}
      POSTGRES_DB: ${POSTGRES_DB:-cad_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cad_user} -d ${POSTGRES_DB:-cad_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cad-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cad-app
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cad_user}:${POSTGRES_PASSWORD:-cad_password}@postgres:5432/${POSTGRES_DB:-cad_db}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://cad.bigone1.net}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-https://cad.bigone1.net}
      CAD_API_KEY: ${CAD_API_KEY}
      NODE_ENV: production
    volumes:
      - pdf_reports:/app/public/reports
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  pdf_reports:
