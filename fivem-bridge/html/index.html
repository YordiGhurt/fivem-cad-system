<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAD System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <script>
    window.addEventListener('message', function (event) {
      const data = event.data;
      if (!data || !data.action) return;

      if (data.action === 'open') {
        const url = data.url || '';
        // WICHTIG: Direkt navigieren statt iframe – damit Cookies im CEF korrekt gesetzt werden.
        // Ein <iframe> blockiert Cookie-Setzung (sameSite-Restriction in CEF/Chromium).
        window.location.href = url;
      }
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        fetch('https://fivem-cad-bridge/closeCAD', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        }).catch(function () {});
      }
    });
  </script>
</body>
</html>
